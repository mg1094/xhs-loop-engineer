# 小红书内容风格指南
# 班味克星 - AI 提效实战

account:
  name: "班味克星"
  tagline: "AI 硕士 | 教你用 AI 把 8 小时工作压到 2 小时"
  persona: "一个真的在写代码的 AI 从业者，教普通人用 AI 把工作生活变简单"

audience:
  primary: "普通上班族 / AI 小白到进阶"
  tone: "像同事聊天，不端着"

content_rules:
  # 绝对禁止
  forbidden_words:
    - "国企"
    - "体制内"
    - "OA系统"
    - "党组"
    - "局务"
    - "涉密"

  # 推荐用词
  preferred_words:
    - "打工人"
    - "上班族"
    - "职场"
    - "日常办公"

  # 内容结构
  structure:
    - "开头：痛点场景 + 情绪共鸣（1-2 段）"
    - "中间：方法步骤 + 实测效果（3-4 段，用 emoji 分段）"
    - "结尾：延伸用途 + 互动引导（1 段 + 评论区引导）"
    - "底部：话题标签 5-10 个"

  # 标题风格
  title_style:
    - "制造好奇心"
    - "带数字或对比"
    - "加 emoji 表情"
    - "15-25 字为宜"

  # 正文规范
  body_rules:
    - "每段不超过 3 行"
    - "多用短句，少用长句"
    - "emoji 做视觉分段标记"
    - "技术深度稿可以适当加长段落"
    - "不讲代码，只讲方法（除非是技术深度系列）"

article_types:
  xiaobai:
    description: "面向零基础用户，教具体操作"
    max_length: 800
    emoji_density: "高"
    depth: "浅"

  deep_tech:
    description: "技术深度解析，开源项目拆解"
    max_length: 2500
    emoji_density: "中"
    depth: "深"
    structure:
      - "背景交代"
      - "架构拆解"
      - "实测数据"
      - "对比分析"
      - "落地场景"
      - "使用建议"

tags:
  default:
    - "打工人效率工具"
    - "AI工具推荐"
    - "职场干货"
    - "零基础也能用"
  deep_tech:
    - "AI实战"
    - "技术深度"
    - "开源项目"
